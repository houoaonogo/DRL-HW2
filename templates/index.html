<!DOCTYPE html>
<html>
<head>
    <title>HW1 Gridworld</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        .grid-container { 
            display: grid; gap: 1px; background-color: #333; 
            margin: 20px auto; width: fit-content; border: 2px solid #333;
        }
        .cell { 
            width: 60px; height: 60px; background: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 11px; cursor: pointer; position: relative;
        }
        .start { background-color: #228B22 !important; color: white; } /* 綠色 */
        .end { background-color: #FF0000 !important; color: white; }   /* 紅色 */
        .wall { background-color: #808080 !important; }               /* 灰色 */
        .path-highlight { background-color: #90EE90 !important; }     /* 最佳路徑淺綠色 */
        .arrow { font-size: 20px; font-weight: bold; color: #333; }
        .val { color: #555; font-size: 10px; }
        .btn-group { margin: 15px; }
    </style>
</head>
<body>
    <h2>Generate n x n Square</h2>
    <div>
        Enter n (5-9): <input type="number" id="nInput" value="5" min="5" max="9">
        <button onclick="initGrid()">Generate Square</button>
    </div>

    <div class="btn-group">
        <button onclick="runCalc('hw1-2')">HW1-2: Random Policy</button>
        <button onclick="runCalc('hw1-3')">HW1-3: Value Iteration</button>
    </div>

    <div id="msg" style="font-weight: bold; color: blue;">1. Click to set START (Green)</div>
    <div id="grid" class="grid-container"></div>

    <script>
        let n, start=null, end=null, walls=[], clickCount=0;

        function initGrid() {
            n = parseInt(document.getElementById('nInput').value);
            start=null; end=null; walls=[]; clickCount=0;
            document.getElementById('msg').innerText = "1. Click to set START (Green)";
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${n}, 60px)`;
            for(let i=0; i<n*n; i++){
                let r = Math.floor(i/n), c = i%n;
                const cell = document.createElement('div');
                cell.id = `c-${r}-${c}`;
                cell.className = 'cell';
                cell.innerText = i + 1; // HW1-1 顯示數字
                cell.onclick = () => handleCell(r, c);
                grid.appendChild(cell);
            }
        }

        function handleCell(r, c) {
            let el = document.getElementById(`c-${r}-${c}`);
            if(clickCount === 0) {
                start=[r,c]; el.className='cell start'; el.innerText="START";
                clickCount++; document.getElementById('msg').innerText="2. Click to set END (Red)";
            } else if(clickCount === 1) {
                if(el.classList.contains('start')) return;
                end=[r,c]; el.className='cell end'; el.innerText="END";
                clickCount++; document.getElementById('msg').innerText=`3. Click to set ${n-2} Obstacles (Grey)`;
            } else if(clickCount < 2 + (n-2)) {
                if(el.classList.contains('start') || el.classList.contains('end')) return;
                walls.push([r,c]); el.className='cell wall'; el.innerText="";
                clickCount++;
                if(clickCount === 2+(n-2)) document.getElementById('msg').innerText="Setup Complete! Choose HW1-2 or HW1-3";
            }
        }

        async function runCalc(mode) {
            if(!start || !end) return alert("Please setup map first!");
            const res = await fetch('/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ n, start, end, walls, mode })
            });
            const data = await res.json();
            updateDisplay(data, mode);
        }

        function updateDisplay(data, mode) {
            for(let r=0; r<n; r++) {
                for(let c=0; c<n; c++) {
                    let el = document.getElementById(`c-${r}-${c}`);
                    if(el.classList.contains('wall')) continue;
                    
                    let v = data.v_matrix[r][c];
                    let p = data.policy[r][c];
                    
                    // 清空內容重新填充
                    el.innerHTML = `<div class="val">${v}</div><div class="arrow">${p}</div>`;
                    if(r===start[0] && c===start[1]) el.innerHTML += "START";
                    if(r===end[0] && c===end[1]) el.innerHTML += "END";
                }
            }
            // 第三張圖片要求：HW1-3 最佳路徑高亮 (選配，視助教要求)
            if(mode === 'hw1-3') document.getElementById('msg').innerText = "Optimal Policy & Value Displayed";
        }
        initGrid();
    </script>
</body>
</html>
